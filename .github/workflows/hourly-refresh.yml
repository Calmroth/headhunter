name: Hourly jobs refresh + deploy

# True 24/7 background refresh. Runs on GitHub's infrastructure regardless of
# whether any local machine is on. Each run stamps src/data/jobs.ts with today's
# UTC date and, when the date actually changed, pushes to main — Vercel's Git
# Integration auto-deploys the new commit.
#
# No secrets, no API key, no cost. The stamp script is pure Node and cannot fail
# the build. Job posting dates ("2h ago") already re-anchor client-side at page
# load, so listings stay live between runs; this keeps the footer date fresh.

on:
  schedule:
    - cron: '17 * * * *'   # hourly at :17 UTC (off-minute, avoids the :00 stampede)
  workflow_dispatch: {}     # allow manual runs from the Actions tab

permissions:
  contents: write           # allow committing + pushing back to the repo

concurrency:
  group: hourly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Stamp today's date
        run: node scripts/refresh-timestamp.mjs

      - name: Commit & push if changed
        run: |
          git config user.name  "headhunter-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data/jobs.ts
          if git diff --cached --quiet; then
            echo "No date change this run — nothing to deploy."
          else
            git commit -m "chore(jobs): daily timestamp refresh [skip ci]"
            git push origin main
          fi
